<!DOCTYPE html>
<html lang="en">
<head>
    <title>Your Favorites</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #474746 0%, #474746 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
            color: white;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 1.5rem 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
        }

        .stat-number {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(45deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            display: block;
        }

        .stat-label {
            color: rgba(255, 255, 255, 0.8);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.9rem;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .favorite-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            opacity: 0;
            transform: translateY(50px);
            animation: slideUp 0.6s ease forwards;
        }

        .favorite-card:nth-child(odd) { animation-delay: 0.1s; }
        .favorite-card:nth-child(even) { animation-delay: 0.2s; }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .favorite-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
        }

        .card-image {
            position: relative;
            height: 220px;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .favorite-card:hover .card-image img {
            transform: scale(1.1);
        }

        .card-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, rgba(118, 123, 145, 0.8), rgba(118, 75, 162, 0.8));
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 1;
        }

        .favorite-card:hover .card-image::before {
            opacity: 1;
        }

        .card-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 2;
            text-align: center;
        }

        .favorite-card:hover .card-overlay {
            opacity: 1;
        }

        .card-content {
            padding: 1.5rem;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #2d3748;
            line-height: 1.3;
        }

        .card-description {
            color: #718096;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #fed7d7;
            color: #c53030;
        }

        .btn-danger:hover {
            background: #feb2b2;
            transform: translateY(-2px);
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255, 255, 255, 0.8);
        }

        .empty-state i {
            font-size: 6rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }

        .empty-state h2 {
            font-size: 2rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }
            
            .header h1 {
                font-size: 2rem;
            }
            
            .grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            
            .stats {
                gap: 1rem;
            }
            
            .stat-card {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-heart"></i> Your Favorites</h1>
            <p>Discover and revisit your saved content</p>
        </div>

        <div class="stats" id="stats">
            <!-- Stats will be populated by JavaScript -->
        </div>

        <div class="grid" id="favorites"></div>

        <div class="empty-state" id="emptyState" style="display: none;">
            <i class="fas fa-heart-broken"></i>
            <h2>No favorites yet</h2>
            <p>Start exploring and save your favorite items to see them here.</p>
        </div>
    </div>

    <script>
        class FavoritesManager {
            constructor() {
                this.favorites = JSON.parse(localStorage.getItem('favorites')) || {};
                this.container = document.getElementById('favorites');
                this.statsContainer = document.getElementById('stats');
                this.emptyState = document.getElementById('emptyState');
                this.init();
            }

            init() {
                this.renderStats();
                this.renderFavorites();
            }

            renderStats() {
                const count = Object.keys(this.favorites).length;
                this.statsContainer.innerHTML = `
                    <div class="stat-card">
                        <span class="stat-number">${count}</span>
                        <span class="stat-label">Total Favorites</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-number">${count}</span>
                        <span class="stat-label">Saved Items</span>
                    </div>
                `;
            }

            renderFavorites() {
                if (Object.keys(this.favorites).length === 0) {
                    this.container.style.display = 'none';
                    this.emptyState.style.display = 'block';
                    return;
                }

                this.container.style.display = 'grid';
                this.emptyState.style.display = 'none';

                Object.values(this.favorites).forEach((item, index) => {
                    const card = this.createCard(item, index);
                    this.container.appendChild(card);
                });
            }

            createCard(item, index) {
                const div = document.createElement('div');
                div.className = 'favorite-card';
                div.style.animationDelay = `${index * 0.1}s`;
                
                div.innerHTML = `
                    <div class="card-image">
                        <img src="${item.img}" alt="${item.title}" loading="lazy">
                        <div class="card-overlay">
                            <i class="fas fa-external-link-alt fa-2x"></i>
                            <div>Open in new tab</div>
                        </div>
                    </div>
                    <div class="card-content">
                        <h3 class="card-title">${this.escapeHtml(item.title)}</h3>
                        <p class="card-description">${this.escapeHtml(item.desc || 'No description available')}</p>
                        <div class="card-actions">
                            <a href="${item.full}" target="_blank" class="btn btn-primary">
                                <i class="fas fa-external-link-alt"></i>
                                Open
                            </a>
                            <button class="btn btn-danger" onclick="favoritesManager.removeFavorite('${Object.keys(this.favorites).find(key => this.favorites[key] === item)}')">
                                <i class="fas fa-trash"></i>
                                Remove
                            </button>
                        </div>
                    </div>
                `;
                return div;
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            removeFavorite(key) {
                if (confirm('Remove this favorite?')) {
                    delete this.favorites[key];
                    localStorage.setItem('favorites', JSON.stringify(this.favorites));
                    this.refresh();
                }
            }

            refresh() {
                this.container.innerHTML = '';
                this.init();
            }
        }

        // Initialize when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            window.favoritesManager = new FavoritesManager();
        });

        // Add service worker for offline support (optional)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
