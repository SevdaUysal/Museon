<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marketplace - Museon</title>
  <meta name="description" content="Buy original art from verified artists. Paintings, sculptures, digital art.">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="marketplace-page">
  <!-- HEADER (same as index.html) -->
  <header class="header">
    <div class="container header-container">
      <h1 id="logo"><a href="index.html">Museon</a></h1>
      <nav>
        <ul class="nav-list">
          <li><a href="index.html#home">Home</a></li>
          <li><a href="index.html#gallery">Gallery</a></li>
          <li><a href="#" class="active">Marketplace</a></li>
          <li><a href="index.html#exhibitions">Exhibitions</a></li>
        </ul>
        <div class="header-actions">
          <div class="cart-icon" id="cart-icon">
            <i class="fas fa-shopping-cart"></i>
            <span class="cart-count" id="cart-count">0</span>
          </div>
          <a href="#login" class="btn-login">Sell Your Art</a>
        </div>
        <button id="menu-toggle" class="menu-toggle"><i class="fas fa-bars"></i></button>
      </nav>
    </div>
  </header>

  <!-- MARKETPLACE HERO -->
  <section class="marketplace-hero">
    <div class="container">
      <div class="hero-content text-center">
        <h1 class="hero-title">Art Marketplace</h1>
        <p class="hero-subtitle">Discover 5,000+ original artworks from verified artists</p>
        <div class="marketplace-filters">
          <select id="category-filter">
            <option>All Categories</option>
            <option>Paintings</option>
            <option>Sculptures</option>
            <option>Digital Art</option>
            <option>Photography</option>
          </select>
          <select id="sort-filter">
            <option>Sort by: Featured</option>
            <option>Price: Low to High</option>
            <option>Price: High to Low</option>
            <option>Newest First</option>
          </select>
          <input type="text" id="search-input" placeholder="Search artworks...">
        </div>
      </div>
    </div>
  </section>

  <!-- ARTWORK GRID -->
  <section class="marketplace-main container">
    <div class="marketplace-stats">
      <span>2,847 artworks • 156 artists • 94 sold today</span>
    </div>
    
    <div id="marketplace-grid" class="artwork-grid">
      <!-- Dynamic artworks loaded by JS -->
      <div class="artwork-card skeleton">
        <div class="skeleton-image"></div>
        <div class="skeleton-content">
          <div class="skeleton-title"></div>
          <div class="skeleton-artist"></div>
          <div class="skeleton-price"></div>
        </div>
      </div>
      <!-- More skeletons... -->
    </div>

    <!-- LOAD MORE BUTTON -->
    <div class="load-more-container">
      <button id="load-more" class="btn-primary btn-large">Load More Artworks</button>
    </div>
  </section>

  <!-- ARTWORK DETAIL MODAL -->
  <div id="artwork-modal" class="modal artwork-modal">
    <div class="modal-content">
      <span class="modal-close">&times;</span>
      <div class="artwork-detail-content">
        <!-- Dynamic artwork details -->
      </div>
    </div>
  </div>

  <!-- FOOTER (same as index.html) -->
  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 Museon. Marketplace powered by verified artists.</p>
    </div>
  </footer>

  <script src="js/marketplace.js"></script>
</body>
</html>
